name: Bug report
description: Report a reproducible router defect or regression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Report one issue at a time. Redact credentials, private paths, hostnames, and sensitive application data.
        Report security issues through the private security advisory link instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observed router defect in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide the shortest deterministic reproduction.
      placeholder: |
        1. Install @openclaw/uirouter@...
        2. Define routes with...
        3. Call router.navigate(...) or router.start(...)
        4. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version or commit
      placeholder: "@openclaw/uirouter@0.1.0 or commit SHA"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected router surface
      options:
        - Route matching
        - Navigation or history adapter
        - Loader lifecycle or cancellation
        - Redirect or notFound
        - Preload, cache, invalidate, or revalidate
        - Subscriptions or reactive state
        - TypeScript types or package exports
        - Multiple surfaces
        - Other
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Browser app
        - Node.js tooling or tests
        - Memory history
        - Multiple runtimes
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Runtime version, browser or platform, package manager, and operating system.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Redacted logs, state, or route definition
      description: Include only the evidence needed to reproduce and diagnose the issue.
      render: shell
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain severity, frequency, and affected consumers or applications.
    validations:
      required: true
