name: Feature request
description: Propose a new router capability or public API change.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete problem cannot be solved with the current router API?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: Describe the desired contract, including route, loader, history, cache, subscription, type, or runtime behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Explain existing workarounds and why they are insufficient.
  - type: checkboxes
    id: surfaces
    attributes:
      label: Affected surfaces
      options:
        - label: Route matching
        - label: Navigation or history adapter
        - label: Loader lifecycle, cancellation, redirect, or notFound
        - label: Preload, cache, invalidate, or revalidate
        - label: Subscriptions or reactive state
        - label: Exported TypeScript API or package output
        - label: Browser app integration
        - label: Node.js tooling or tests
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility considerations
      description: Note ordering, cancellation, stale-data, caching, migration, package export, runtime, or breaking-change concerns.
    validations:
      required: true
