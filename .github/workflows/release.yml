name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24
  PNPM_VERSION: 11.9.0

jobs:
  publish:
    name: Publish @openclaw/uirouter
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package metadata
        run: |
          node <<'NODE'
          const { readFileSync } = require("node:fs");

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const expectedName = "@openclaw/uirouter";
          const expectedAuthor = "OpenClaw Team <dev@openclaw.ai>";
          const expectedRepo = "https://github.com/openclaw/uirouter";
          const repository = typeof pkg.repository === "string"
            ? pkg.repository
            : pkg.repository?.url;
          const normalize = (value) =>
            String(value ?? "")
              .trim()
              .replace(/^git\+/, "")
              .replace(/\.git$/i, "")
              .replace(/\/+$/, "");

          const errors = [];
          if (pkg.name !== expectedName) {
            errors.push(`package name must be ${expectedName}; found ${pkg.name ?? "<missing>"}`);
          }
          if (pkg.author !== expectedAuthor) {
            errors.push(`package author must be ${expectedAuthor}; found ${pkg.author ?? "<missing>"}`);
          }
          if (normalize(repository) !== expectedRepo) {
            errors.push(`repository URL must be ${expectedRepo}; found ${normalize(repository) || "<missing>"}`);
          }
          if (pkg.private === true) {
            errors.push("package must not be private");
          }
          if (errors.length > 0) {
            for (const error of errors) console.error(error);
            process.exit(1);
          }
          NODE

      - name: Validate release tag
        env:
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main

          node <<'NODE'
          const { execFileSync } = require("node:child_process");
          const { readFileSync } = require("node:fs");

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const releaseTag = process.env.RELEASE_TAG ?? "";
          const releaseSha = process.env.RELEASE_SHA ?? "";
          const expectedTag = `v${pkg.version}`;

          if (!/^v\d+\.\d+\.\d+$/.test(releaseTag)) {
            throw new Error(`release tag must match vX.Y.Z; received ${releaseTag || "<missing>"}`);
          }
          if (releaseTag !== expectedTag) {
            throw new Error(`release tag ${releaseTag} does not match package version ${pkg.version}`);
          }
          execFileSync("git", ["merge-base", "--is-ancestor", releaseSha, "origin/main"]);
          NODE

      - name: Resolve npm publish state
        id: npm-version
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          set +e
          output="$(npm view "${package_name}@${package_version}" version 2>&1)"
          status=$?
          set -e
          if [ "${status}" -eq 0 ]; then
            echo "${package_name}@${package_version} is already published; treating this as a release rerun."
            echo "published=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if ! printf '%s\n' "${output}" | grep -q "E404"; then
            printf '%s\n' "${output}" >&2
            exit "${status}"
          fi
          echo "published=false" >> "${GITHUB_OUTPUT}"

      - name: Check
        run: pnpm run check

      - name: Publish with npm trusted publishing
        if: steps.npm-version.outputs.published != 'true'
        run: npm publish --access public --provenance

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || gh release create "${RELEASE_TAG}" --verify-tag --title "${RELEASE_TAG}" --generate-notes
